# Keywords Configuration
# 关键词配置 - 用于脚本自动匹配
#
# 平台说明:
# - android_tv: Android TV + homed APK (标准logcat格式)
# - android_stb_rom: Android 机顶盒 ROM + homed APK (带TID的logcat格式)
# - linux_stb: Linux 机顶盒 + iPanel中间件
#
# platforms 字段可选，不设置则适用于所有平台

# Homed 平台登录 (前置条件)
# Launcher APK 启动后首先需要完成 Homed 平台登录
homed:
  tags:
    - ServiceHelper
    - HomedDataSourceManager
    - StbApp
  patterns:
    - name: homed_login_success
      regex: "ServiceHelper.*response.*account/login"
      severity: info
      description: "Homed 平台登录响应"

    - name: homed_user_list_success
      regex: "ServiceHelper.*response.*account/user/get_list"
      severity: info
      description: "Homed 用户列表获取成功"

    - name: homed_api_success
      regex: "monitorAPIResponse onResponse success=true"
      severity: info
      description: "Homed API 响应成功"

    - name: homed_not_login
      regex: "not login.*skp|HomedDataSourceManager.*not login"
      severity: warning
      description: "Homed 未登录"

# CBN / 国网 SDK (登录相关)
# 注意: USB Dongle 与 CBN 登录是独立的两个模块，不接 Dongle 也可以成功登录 CBN
# 前置条件: Homed 平台登录成功
cbn:
  tags:
    - CBN_UI_SDK
    - CBN-sdk
    - GwSDK
  patterns:
    - name: login_params_unresolved
      regex: "loginParams.*\\$\\(func://"
      severity: warning
      description: "登录参数未解析"

    - name: data_init_fail
      regex: "onGetTabCardsError|数据初始化失败"
      severity: error
      description: "数据初始化失败"

    - name: home_not_exist
      regex: "HomeDataManager.*不存在|HomeDataManager.*失败"
      severity: warning
      description: "首页数据不存在"

    - name: login_success
      regex: "CBNSdk\\.init onLoginSuccess"
      severity: info
      description: "国网 SDK 登录成功"

    - name: tabcards_success
      regex: "onGetTabCards list\\.size:\\d+"
      severity: info
      description: "TabCards 数据获取成功"

# CBN 栏目加载检测 (扩展模块)
# 用于分析日志中加载了哪些国网栏目
cbn_columns:
  tags:
    - CBN_UI_SDK
    - HomeDataManager
    - GwPortalFragment
    - HomeContentFragment
  patterns:
    - name: column_cache_load
      regex: "读取缓存的page\\s+(\\S+)\\s+成功"
      severity: info
      description: "栏目缓存加载成功"

    - name: column_use_cache
      regex: "使用本地缓存:\\s*(\\S+)"
      severity: info
      description: "使用本地缓存栏目"

    - name: column_tabcards
      regex: "onGetTabCards list\\.size:(\\d+)"
      severity: info
      description: "栏目卡片数量"

    - name: column_switch
      regex: "setUserVisibleHint isVisibleToUser = true.*tabId\\s*=\\s*(\\S+)"
      severity: info
      description: "栏目切换显示"

    - name: column_resume
      regex: "HomeContentFragment onResume.*tabId\\s*:\\s*(\\S+)"
      severity: info
      description: "栏目恢复显示"

    - name: column_fragment_create
      regex: "createFragment.*es_tabId=(\\S+)&"
      severity: info
      description: "栏目 Fragment 创建"

# USB Dongle (独立模块，与 CBN 登录无直接关联)
dongle:
  tags:
    - DongleManager
    - DongleProtocol
  patterns:
    - name: usb_dongle_fail
      regex: "DongleManager.*openUsbDevice ret = -1"
      severity: error
      description: "USB 加密狗打开失败"

    - name: dongle_not_found
      regex: "DongleManager.*can not find device"
      severity: error
      description: "USB 设备未找到"

    - name: ca_info_null
      regex: "oid=null.*caid=null|caid=null.*oid=null"
      severity: error
      description: "CA 卡信息为空"

    - name: device_auth_ok
      regex: "deviceAuth true"
      severity: info
      description: "设备认证通过"

# HDMI
hdmi:
  tags:
    - aml_hal_core_detect
    - tvhalServer
    - tvhal_client
    - cec_hal
  patterns:
    - name: hdmi_plug_in
      regex: "HDMI.*plug in|status:plug in"
      severity: info
      description: "HDMI 设备连接"

    - name: hdmi_plug_out
      regex: "HDMI.*plug out|status:plug out"
      severity: info
      description: "HDMI 设备断开"

    - name: hdmi_cec_init
      regex: "HdmiDrvClient.*Init ret"
      severity: info
      description: "HDMI CEC 初始化"
      platforms: [android_stb_rom]

# Audio
audio:
  tags:
    - audio_hw_primary
    - AudioTrack
    - AudioFlinger
  patterns:
    - name: audio_underrun
      regex: "audio.*underrun"
      severity: warning
      description: "音频缓冲区欠载"

    - name: audio_fail
      regex: "audio.*(fail|error)"
      severity: error
      description: "音频失败"

    - name: ao_error
      regex: "ERROR-ao.*ERR:0x[0-9a-fA-F]+"
      severity: error
      description: "音频输出错误 (Linux STB)"
      platforms: [linux_stb]

# Network
network:
  tags:
    - NET_SDK
    - NetworkSpeedMonitor
  patterns:
    - name: connect_timeout
      regex: "timeout.*(connect|connection)"
      severity: warning
      description: "连接超时"

    - name: network_disconnect
      regex: "disconnect|disconnected"
      severity: warning
      description: "网络断开"

# SELinux (Android STB ROM 特有)
selinux:
  tags:
    - auditd
    - SELinux
  patterns:
    - name: selinux_denied
      regex: "avc:\\s*denied\\s+\\{[^}]+\\}"
      severity: warning
      description: "SELinux 权限拒绝"
      platforms: [android_stb_rom, android_tv]

    - name: selinux_permissive
      regex: "permissive=1"
      severity: info
      description: "SELinux 宽容模式"
      platforms: [android_stb_rom, android_tv]

# HAL 层 (Android STB ROM 特有)
hal:
  tags:
    - hwc
    - HWComposer
    - SurfaceFlinger
    - hidisp
  patterns:
    - name: hwc_error
      regex: "HwcFbFreshfbHandle is null"
      severity: error
      description: "显示缓冲区为空"
      platforms: [android_stb_rom]

    - name: hwc_composition_error
      regex: "change composition type layer is empty"
      severity: error
      description: "图层合成错误"
      platforms: [android_stb_rom]

    - name: present_failed
      regex: "presentAndGetReleaseFences.*present failed"
      severity: error
      description: "显示呈现失败"
      platforms: [android_stb_rom]

    - name: hidisp_init
      regex: "hidisp.*open_display"
      severity: info
      description: "显示初始化"
      platforms: [android_stb_rom]

# Bluetooth 蓝牙模块
bluetooth:
  tags:
    - BluetoothAdapter
    - BluetoothManagerService
    - audiohalservice
    - wifi_bt
  patterns:
    - name: bt_binder_null
      regex: "BluetoothAdapter.*Bluetooth binder is null"
      severity: error
      description: "蓝牙服务不可用 (binder为空)"

    - name: bt_hal_not_found
      regex: "Could not get passthrough implementation.*bluetooth"
      severity: error
      description: "蓝牙 HAL 实现获取失败"

    - name: bt_audio_offload_fail
      regex: "Could not register Bluetooth audio offload"
      severity: warning
      description: "蓝牙音频卸载注册失败"

    - name: bt_class_not_found
      regex: "Class not found for preloading.*[Bb]luetooth"
      severity: warning
      description: "蓝牙类预加载失败"

    - name: bt_manifest_missing
      regex: "Cannot find entry.*bluetooth.*in either framework or device manifest"
      severity: warning
      description: "蓝牙服务未在 manifest 中注册"

    - name: bt_init_success
      regex: "wifi_bt.*libbluetooth\\.so"
      severity: info
      description: "蓝牙库加载"

    - name: bt_device_add
      regex: "rtkbt_dev.*add"
      severity: info
      description: "蓝牙设备添加"

# Crash
crash:
  patterns:
    - name: native_crash
      regex: "\\*\\*\\*.*Build fingerprint"
      severity: critical
      description: "Native 崩溃"

    - name: anr
      regex: "ANR in\\s+(\\S+)"
      severity: critical
      description: "应用无响应"

    - name: java_exception
      regex: "(Exception|Error):"
      severity: error
      description: "Java 异常"

# Performance
performance:
  patterns:
    - name: cpu_temp
      regex: "CPU temperatures:\\s*\\[([\\d.]+)\\]"
      severity: info
      description: "CPU 温度"

    - name: frame_drop
      regex: "skipped\\s+(\\d+)\\s+frames"
      severity: warning
      description: "掉帧"

    - name: thermal_throttle
      regex: "thermal.*(high|warning|throttle)"
      severity: warning
      description: "过热降频"

# Linux STB 特有模式
linux_stb:
  patterns:
    - name: mount_failed
      regex: "mount.*failed"
      severity: error
      description: "挂载失败"
      platforms: [linux_stb]

    - name: porting_init
      regex: "\\[I\\]\\[\\d+\\]\\[porting_\\w+_init"
      severity: info
      description: "端口初始化"
      platforms: [linux_stb]

    - name: breakpoint_debug
      regex: "\\)\\s*:\\s*breakpoint!"
      severity: info
      description: "调试断点"
      platforms: [linux_stb]

# ICC 快速切台分析
# 用于分析 ICC流+UDP流 快速切台时 PTS 时间戳异常导致无法切换的问题
# 触发场景: 用户说"快速切台问题"、"只播ICC"、"没有切换UDP"、"没有快速切台"、"ICC切换问题"、"频道切换失败"
icc_switch:
  tags:
    - mplayer-jni
    - ilocal_icclive_player
  patterns:
    - name: icc_iframe_info
      regex: "find a iframe!pts=(\\d+)!!icc_first_pts=(\\d+),first_get_block_system_time=(\\d+) ms,now:(\\d+) ms"
      severity: info
      description: "ICC切台PTS: UDP流PTS=$1, ICC流PTS=$2"

    - name: icc_player_error
      regex: "ilocal_icclive_player.*error|icc.*fail"
      severity: error
      description: "ICC 播放器错误"

    - name: channel_info
      regex: "getAllChannels chnl_name=([^,]+), chnl_num=(\\d+)serviceId=(\\d+),channelid:(\\d+)"
      severity: info
      description: "频道信息: $1 (频道号:$2, serviceId:$3, channelId:$4)"

# 案例索引
cases:
  - id: case_001
    name: CBN 登录失败 (Dongle 问题导致)
    file: case_001_cbn_login_fail.md
    note: "本案例中登录失败与 Dongle 问题同时发生，但 Dongle 问题不是所有 CBN 登录失败的唯一原因"
    keywords:
      - onGetTabCardsError
      - loginParams
      - oid=null
      - caid=null
    diagnose_commands:
      - "grep -E 'onLoginSuccess|onLoginError' <logfile>"
      - "grep 'loginParams' <logfile>"
      - "grep -E 'onGetTabCardsError|HomeDataManager.*失败' <logfile>"

  - id: case_002
    name: CBN 登录成功 (有 Dongle)
    file: case_002_cbn_login_success.md
    keywords:
      - onLoginSuccess
      - onGetTabCards
      - loginParams
    diagnose_commands:
      - "grep -E 'onLoginSuccess|onLoginError' <logfile>"
      - "grep -E 'loginParams|login params' <logfile>"
      - "grep -E 'onGetTabCards|GetTabCards.*200' <logfile>"

  - id: case_002b
    name: CBN 登录成功 (无 Dongle)
    file: case_002b_cbn_login_success_no_dongle.md
    note: "不接 USB Dongle 也可以成功登录 CBN，使用本地设备 ID 认证"
    keywords:
      - onLoginSuccess
      - deviceAuthByLocalDevice
      - onGetTabCards
    diagnose_commands:
      - "grep -E 'onLoginSuccess|onLoginError' <logfile>"
      - "grep 'deviceAuthByLocalDevice' <logfile>"
      - "grep -E 'onGetTabCards|GetTabCards.*200' <logfile>"